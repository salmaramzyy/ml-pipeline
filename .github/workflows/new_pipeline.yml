name: ML Pipeline

on:
  push:

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clean old data
        run: rm -rf mlruns mlflow.db

      - name: Train model
        run: python train.py

      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Upload MLflow DB       
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Download MLflow DB     # ✅ downloads mlflow.db directly to cwd
        uses: actions/download-artifact@v4
        with:
          name: mlflow-db

      - name: Debug files
        run: |
          echo "Run ID: $(cat model_info.txt)"
          ls -lh mlflow.db

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install MLflow
        run: pip install mlflow

      - name: Check threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"